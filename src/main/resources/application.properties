# ================================================
# application.properties — Base config
# Used for LOCAL development (docker-compose)
# Production overrides are in application-aws.properties
# ================================================

server.port=${SERVER_PORT:8080}

# ── Database (local docker-compose postgres) ──────
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/ecommerce}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.flyway.url=${DB_URL:jdbc:postgresql://postgres:5432/ecommerce}
spring.flyway.user=${DB_USER:postgres}
spring.flyway.password=${DB_PASSWORD:postgres}

# ── Redis (local docker-compose redis) ────────────
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Kafka (local docker-compose kafka) ────────────
spring.kafka.bootstrap-servers=${KAFKA_BROKER:kafka:9092}
spring.kafka.listener.auto-startup=false
spring.kafka.admin.auto-create=false

# ── AWS (from .env) ───────────────────────────────
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
aws.s3.region=${AWS_REGION:us-east-1}
aws.ses.sender=${AWS_SES_SENDER:}

# ── Elasticsearch: disabled locally too ───────────
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

# ── Payment API ───────────────────────────────────
payment.api.url=${PAYMENT_API_URL:https://api.stripe.com}