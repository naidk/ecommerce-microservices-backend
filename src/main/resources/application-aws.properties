# ================================================
# application-aws.properties
# Active when spring.profiles.active=aws
# All secrets injected via EB Environment Variables
# ================================================

server.port=${SERVER_PORT:8080}

# ── Database (Neon.tech or RDS) ──────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=5000
spring.datasource.hikari.connection-timeout=5000

spring.flyway.url=${DB_URL}
spring.flyway.user=${DB_USER}
spring.flyway.password=${DB_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# ── Redis (Upstash or ElastiCache) ───────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}

# ── Kafka (Aiven) ─────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BROKER}
spring.kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
spring.kafka.properties.sasl.jaas.config=${KAFKA_JAAS_CONFIG}
spring.kafka.listener.auto-startup=true
spring.kafka.admin.auto-create=true

# Aiven SSL truststore (embedded in Docker image)
spring.kafka.properties.ssl.truststore.location=/app/client.truststore.jks
spring.kafka.properties.ssl.truststore.password=secret
spring.kafka.properties.ssl.endpoint.identification.algorithm=https

# Consumer settings
spring.kafka.consumer.group-id=ecommerce-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Producer settings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.retries=1
spring.kafka.producer.properties.delivery.timeout.ms=10000
spring.kafka.producer.properties.request.timeout.ms=5000

# ── AWS S3 & SES ─────────────────────────────────
aws.s3.access-key=${AWS_ACCESS_KEY_ID}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.region=${AWS_REGION:us-east-1}
aws.ses.sender=${AWS_SES_SENDER}

# ── Actuator (for EB health checks) ──────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Elasticsearch: DISABLED in prod ──────────────
spring.data.elasticsearch.repositories.enabled=false
spring.data.elasticsearch.repositories.type=none
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration