name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1: Build & Deploy ─────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy (Docker)
    runs-on: ubuntu-latest
    outputs:
      eb_url: ${{ steps.fetch_url.outputs.eb_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create deployment package
        run: |
          # Include essentials for the Docker runtime and Nginx configuration
          zip -r deploy.zip Dockerfile Dockerrun.aws.json aiven-ca.crt target/*.jar .platform/

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ecommerce-api
          environment_name: ecommerce-api-prod
          version_label: "v${{ github.run_number }}-${{ github.sha }}"
          region: us-east-1
          deployment_package: deploy.zip
          wait_for_environment_recovery: 600

      - name: Fetch Elastic Beanstalk CNAME
        id: fetch_url
        run: |
          CNAME=$(aws elasticbeanstalk describe-environments --application-name ecommerce-api --environment-names ecommerce-api-prod --query "Environments[0].CNAME" --output text --region us-east-1)
          echo "eb_url=http://$CNAME" >> $GITHUB_OUTPUT

  # ── Job 2: API Tests (runs after deploy) ─────────────────────────────────
  api-tests:
    name: Run API Tests (Newman)
    runs-on: ubuntu-latest
    needs: build-and-deploy
    env:
      BASE_URL: ${{ needs.build-and-deploy.outputs.eb_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Wait for EB app to be ready
        run: |
          echo "Waiting for application to start..."
          sleep 60
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BASE_URL/actuator/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Application is healthy!"
              break
            fi
            sleep 15
          done

      - name: Run Newman API Tests
        run: |
          newman run automated_test_collection.json \
            --env-var "baseUrl=$BASE_URL" \
            --delay-request 500 \
            --reporters cli,junit \
            --reporter-junit-export test-results/newman-results.xml
        continue-on-error: false

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-test-results
          path: test-results/
          retention-days: 30
