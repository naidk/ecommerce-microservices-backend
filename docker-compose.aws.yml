services:
  app:
    build: .
    container_name: ecommerce_api
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      - SERVER_PORT=${PORT:-8080}

      # Database
      - DB_URL=${DB_URL:-jdbc:postgresql://postgres:5432/ecommerce}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}

      # Redis
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_SSL_ENABLED=${REDIS_SSL_ENABLED:-false}

      # AWS (prefer IAM Role; keep non-secret here)
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_SES_SENDER=${AWS_SES_SENDER}

      # JWT
      - JWT_SECRET=${JWT_SECRET}

      # Disable Kafka + Elasticsearch features in app
      - SPRING_PROFILES_ACTIVE=aws
      - DISABLE_KAFKA=true
      - DISABLE_ELASTICSEARCH=true

    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: